<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Anruf</title>
<style>
  :root{
    --anthracite: rgba(40,42,45,0.55);
    --anthracite-solid: #2b2d30;
    --red: #ff3b30;
    --white: #ffffff;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background:#000; overflow:hidden;
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    color: var(--white);
  }
  #stage{
    position:fixed; inset:0; width:100vw; height:100dvh;
    overflow:hidden; background:#111;
  }

  /* Live camera feed */
  #video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror, like a selfie cam */
    background:#1a1a1a;
    transition: filter .25s ease;
  }

  /* Freeze-frame overlay (a captured still shown during "connection issues") */
  #freezeCanvas{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; transform: scaleX(-1);
    display:none;
  }

  /* Top gradient for legibility */
  #topShade{
    position:absolute; top:0; left:0; right:0; height:22%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0));
    pointer-events:none;
  }
  #bottomShade{
    position:absolute; bottom:0; left:0; right:0; height:24%;
    background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0));
    pointer-events:none;
  }

  /* Caller info */
  #callerInfo{
    position:absolute; top: max(18px, env(safe-area-inset-top)); left:0; right:0;
    text-align:center; padding-top: 22px;
    z-index:5;
  }
  #callerName{
    font-size: clamp(20px, 4.5vw, 28px);
    font-weight:600; letter-spacing:0.2px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.35);
  }
  #callStatus{
    margin-top:4px; font-size: clamp(13px,3vw,15px);
    font-weight:400; color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    min-height:20px;
  }
  #callStatus .dots span{
    opacity:0; animation: dotFade 1.4s infinite;
  }
  #callStatus .dots span:nth-child(1){ animation-delay:0s; }
  #callStatus .dots span:nth-child(2){ animation-delay:.2s; }
  #callStatus .dots span:nth-child(3){ animation-delay:.4s; }
  @keyframes dotFade{
    0%,80%,100%{ opacity:0; }
    40%{ opacity:1; }
  }

  /* Right-side circular buttons */
  #sideControls{
    position:absolute; top: max(90px, calc(env(safe-area-inset-top) + 90px));
    right: 18px; z-index:6;
    display:flex; flex-direction:column; gap:14px;
  }
  .circle-btn{
    width:52px; height:52px; border-radius:50%;
    background: var(--anthracite);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer;
    color: var(--white);
  }
  .circle-btn svg{ width:22px; height:22px; fill:none; stroke:var(--white); stroke-width:1.8; }
  .circle-btn:active{ filter:brightness(0.85); }

  /* Bottom pill menu */
  #bottomBar{
    position:absolute; left:50%; bottom: max(28px, calc(env(safe-area-inset-bottom) + 22px));
    transform: translateX(-50%);
    width:min(92%, 460px);
    background: var(--anthracite);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 40px;
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 14px;
    z-index:6;
  }
  .pill-btn{
    width:48px; height:48px; border-radius:50%;
    border:none; background: rgba(255,255,255,0.14);
    display:flex; align-items:center; justify-content:center;
    color:var(--white); cursor:pointer;
  }
  .pill-btn.transparent{ background: transparent; }
  .pill-btn.active-white{ background: var(--white); }
  .pill-btn.active-white svg{ stroke:#1c1c1e; fill:#1c1c1e; }
  .pill-btn.hangup{ background: var(--red); }
  .pill-btn svg{ width:22px; height:22px; fill:none; stroke:var(--white); stroke-width:1.8; }
  .pill-btn.hangup svg{ fill:var(--white); stroke:none; transform: rotate(135deg); }
  .pill-btn:active{ filter:brightness(0.85); }

  /* Fullscreen toggle (subtle, top-left, echoes the small icon row in the reference) */
  #fullscreenBtn{
    position:absolute; top: max(18px, env(safe-area-inset-top)); left:18px;
    z-index:6; width:34px; height:34px; border-radius:50%;
    background: var(--anthracite); border:none; display:flex;
    align-items:center; justify-content:center; cursor:pointer;
  }
  #fullscreenBtn svg{ width:16px; height:16px; stroke:var(--white); fill:none; stroke-width:1.8; }

  /* Status bar mimic (purely decorative, like the screenshot) */
  /* ---------- Glitch / connection trouble layer ---------- */
  #glitchLayer{
    position:absolute; inset:0; z-index:9; pointer-events:none;
    opacity:0; mix-blend-mode: screen;
  }
  #noiseCanvas{ position:absolute; inset:0; width:100%; height:100%; }

  .glitch-active #video, .glitch-active #freezeCanvas{
    filter: saturate(1.4) contrast(1.15);
  }

  #reconnectBanner{
    position:absolute; inset:0; z-index:10;
    display:none; align-items:center; justify-content:center;
    flex-direction:column; gap:10px;
    background: rgba(10,10,10,0.55);
    backdrop-filter: blur(2px);
  }
  #reconnectBanner .spinner{
    width:34px; height:34px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #reconnectBanner span{
    font-size:15px; font-weight:500; text-shadow:0 1px 4px rgba(0,0,0,0.4);
  }

  /* Screen-tear glitch strips */
  .tear{
    position:absolute; left:0; right:0; height:14px;
    background: rgba(255,255,255,0.08);
    transform: translateX(0);
    mix-blend-mode: overlay;
  }

  /* Permission / start overlay */
  #startOverlay{
    position:absolute; inset:0; z-index:20;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:18px; text-align:center; padding:24px;
  }
  #startOverlay h1{ font-size:18px; font-weight:600; margin:0; }
  #startOverlay p{ font-size:14px; color:rgba(255,255,255,0.7); max-width:320px; margin:0; line-height:1.5; }
  #startBtn{
    padding:14px 28px; border-radius:30px; border:none;
    background:#fff; color:#111; font-size:15px; font-weight:600; cursor:pointer;
  }
  #startOverlay.hidden{ display:none; }
</style>
</head>
<body>

<div id="stage" class="">

  <video id="video" autoplay playsinline muted></video>
  <canvas id="freezeCanvas"></canvas>

  <div id="topShade"></div>
  <div id="bottomShade"></div>

  <button id="fullscreenBtn" title="Vollbild">
    <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
  </button>

  <div id="callerInfo">
    <div id="callerName">Maman Joon</div>
    <div id="callStatus"><span id="statusText">Verbinden</span><span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
  </div>

  <div id="sideControls">
    <button class="circle-btn" id="addPersonBtn" title="Teilnehmer hinzufügen">
      <svg viewBox="0 0 24 24"><path d="M16 11a4 4 0 1 0-4-4"/><path d="M2 20c0-3.3 3.1-6 7-6"/><circle cx="9" cy="9" r="3.2"/><path d="M18 8v6M15 11h6"/></svg>
    </button>
    <button class="circle-btn" id="switchCamBtn" title="Kamera wechseln">
      <svg viewBox="0 0 24 24"><path d="M4 9a8 8 0 0 1 14-3M20 15a8 8 0 0 1-14 3"/><path d="M18 3v4h-4M6 21v-4h4"/></svg>
    </button>
    <button class="circle-btn" id="effectsBtn" title="Effekte">
      <svg viewBox="0 0 24 24"><path d="M15 4V2M15 16v-2M8 9H6M22 9h-2M17.8 6.2l1.4-1.4M17.8 11.8l1.4 1.4M12.2 6.2l-1.4-1.4"/><path d="M4 20l9-9 3 3-9 9-3-3z"/></svg>
    </button>
  </div>

  <div id="bottomBar">
    <button class="pill-btn transparent" id="moreBtn" title="Mehr">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>
    </button>
    <button class="pill-btn transparent" id="camToggleBtn" title="Kamera">
      <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    </button>
    <button class="pill-btn active-white" id="speakerBtn" title="Lautsprecher">
      <svg viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
    </button>
    <button class="pill-btn transparent" id="muteBtn" title="Stumm">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22M9 9v3a3 3 0 0 0 4.6 2.5M15 9.3V5a3 3 0 0 0-5.8-1.1M5 10v2a7 7 0 0 0 11 5.7M12 19v3"/></svg>
    </button>
    <button class="pill-btn hangup" id="hangupBtn" title="Auflegen">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 5c-4 0-7.6 1.2-10.5 3.2A1.5 1.5 0 0 0 1 9.5v2.6c0 .7.5 1.3 1.1 1.5l3.4 1c.6.2 1.3 0 1.7-.5l1.2-1.6c.3-.4.9-.6 1.4-.4 1.3.5 2.7.5 4.4.5s3.1 0 4.4-.5c.5-.2 1.1 0 1.4.4l1.2 1.6c.4.5 1.1.7 1.7.5l3.4-1c.6-.2 1.1-.8 1.1-1.5V9.5c0-.5-.2-1-.6-1.3C19.6 6.2 16 5 12 5z"/></svg>
    </button>
  </div>

  <!-- Reconnect / connection issue banner -->
  <div id="reconnectBanner">
    <div class="spinner"></div>
    <span id="reconnectText">Verbindung wird wiederhergestellt …</span>
  </div>

  <div id="glitchLayer"><canvas id="noiseCanvas"></canvas></div>

  <!-- Start overlay: camera permission gate -->
  <div id="startOverlay">
    <h1>Live-Anruf starten</h1>
    <p>Diese Seite braucht Zugriff auf deine Frontkamera, um das Live-Bild anzuzeigen. Am besten im Vollbild und mit Ton aus betrachten.</p>
    <button id="startBtn">Kamera aktivieren</button>
  </div>

  <audio id="ringtoneAudio" loop src="klingelton.mp3"></audio>

</div>

<script>
(function(){
  const video = document.getElementById('video');
  const freezeCanvas = document.getElementById('freezeCanvas');
  const freezeCtx = freezeCanvas.getContext('2d');
  const stage = document.getElementById('stage');
  const startOverlay = document.getElementById('startOverlay');
  const startBtn = document.getElementById('startBtn');
  const statusText = document.getElementById('statusText');
  const reconnectBanner = document.getElementById('reconnectBanner');
  const glitchLayer = document.getElementById('glitchLayer');
  const noiseCanvas = document.getElementById('noiseCanvas');
  const noiseCtx = noiseCanvas.getContext('2d');
  const ringtoneAudio = document.getElementById('ringtoneAudio');

  function playRingtone(){
    ringtoneAudio.currentTime = 0;
    ringtoneAudio.muted = muted;
    ringtoneAudio.play().catch(() => {});
  }
  function stopRingtone(){
    ringtoneAudio.pause();
    ringtoneAudio.currentTime = 0;
  }

  let currentFacing = 'user';
  let stream = null;
  let muted = false;
  let speakerOn = true;
  const PERMISSION_KEY = 'liveCallCameraGranted';

  // ---- Camera handling ----
  async function startCamera(facingMode){
    if(stream){
      stream.getTracks().forEach(t => t.stop());
    }
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode || 'user' },
        audio: false
      });
      video.srcObject = stream;
      video.style.transform = (facingMode === 'environment') ? 'scaleX(1)' : 'scaleX(-1)';
      localStorage.setItem(PERMISSION_KEY, 'true');
      return true;
    }catch(err){
      statusText.textContent = 'Kein Kamerazugriff';
      console.error(err);
      return false;
    }
  }

  async function beginCallExperience(){
    startOverlay.classList.add('hidden');
    beginStatusSequence();
    scheduleGlitches();
    playRingtone();
  }

  startBtn.addEventListener('click', async () => {
    const ok = await startCamera(currentFacing);
    if(ok) beginCallExperience();
  });

  // If the browser already granted camera access before (remembered via
  // localStorage, and the browser itself also remembers the permission
  // per origin), skip the start screen entirely on future visits.
  window.addEventListener('DOMContentLoaded', async () => {
    if(localStorage.getItem(PERMISSION_KEY) === 'true'){
      const ok = await startCamera(currentFacing);
      if(ok){
        beginCallExperience();
      }
      // if it silently fails (e.g. permission was revoked in browser
      // settings), the start overlay stays visible as a fallback.
    }
  });

  document.getElementById('switchCamBtn').addEventListener('click', () => {
    currentFacing = (currentFacing === 'user') ? 'environment' : 'user';
    startCamera(currentFacing);
  });

  // ---- Fullscreen ----
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if(!document.fullscreenElement){
      stage.requestFullscreen?.() || stage.webkitRequestFullscreen?.();
    } else {
      document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    }
  });

  // ---- Mute / speaker / hangup (visual only — this is a staged installation) ----
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.classList.toggle('active-white', muted);
    ringtoneAudio.muted = muted;
  });
  const speakerBtn = document.getElementById('speakerBtn');
  speakerBtn.addEventListener('click', () => {
    speakerOn = !speakerOn;
    speakerBtn.classList.toggle('active-white', speakerOn);
  });
  document.getElementById('hangupBtn').addEventListener('click', () => {
    statusText.textContent = 'Anruf beendet';
    document.querySelector('.dots').style.display = 'none';
    if(stream) stream.getTracks().forEach(t => t.stop());
    stopRingtone();
    setTimeout(() => {
      // restart the "endless calling" loop, since it's the piece's premise
      location.reload();
    }, 2200);
  });

  // ---- Status text sequence: it never really "connects" ----
  const phrases = ['Verbinden', 'Verbinden', 'Erneut verbinden', 'Verbinden'];
  let phraseIndex = 0;
  function beginStatusSequence(){
    setInterval(() => {
      phraseIndex = (phraseIndex + 1) % phrases.length;
      statusText.textContent = phrases[phraseIndex];
    }, 9000 + Math.random()*4000);
  }

  // ---- Freeze frame effect ----
  function freezeFrame(duration){
    if(!video.videoWidth) return;
    freezeCanvas.width = video.videoWidth;
    freezeCanvas.height = video.videoHeight;
    freezeCtx.drawImage(video, 0, 0);
    freezeCanvas.style.display = 'block';
    setTimeout(() => { freezeCanvas.style.display = 'none'; }, duration);
  }

  // ---- Noise overlay ----
  function drawNoise(){
    const w = noiseCanvas.width = window.innerWidth;
    const h = noiseCanvas.height = window.innerHeight;
    const imgData = noiseCtx.createImageData(w, h);
    for(let i=0;i<imgData.data.length;i+=4){
      const v = Math.random()*255;
      imgData.data[i] = v; imgData.data[i+1] = v; imgData.data[i+2] = v;
      imgData.data[i+3] = Math.random()*40;
    }
    noiseCtx.putImageData(imgData, 0, 0);
  }

  function showTears(count){
    const tears = [];
    for(let i=0;i<count;i++){
      const t = document.createElement('div');
      t.className = 'tear';
      t.style.top = (Math.random()*100) + '%';
      t.style.transform = `translateX(${(Math.random()*10-5)}%)`;
      glitchLayer.appendChild(t);
      tears.push(t);
    }
    return tears;
  }

  // ---- Random connection-trouble events ----
  function glitchBurst(){
    stage.classList.add('glitch-active');
    glitchLayer.style.opacity = '1';
    drawNoise();
    const tears = showTears(3 + Math.floor(Math.random()*4));
    const dur = 180 + Math.random()*260;
    setTimeout(() => {
      stage.classList.remove('glitch-active');
      glitchLayer.style.opacity = '0';
      tears.forEach(t => t.remove());
    }, dur);
  }

  function reconnectEvent(){
    // duration varies noticeably call to call, but stays within a
    // believable range — sometimes a quick hiccup, sometimes a longer stall
    const holdTime = 3000 + Math.random()*5000; // ~3–8s
    reconnectBanner.style.display = 'flex';
    freezeFrame(holdTime);
    setTimeout(() => {
      reconnectBanner.style.display = 'none';
    }, holdTime);
  }

  function scheduleGlitches(){
    // small glitches: every 15–30s
    (function loopSmall(){
      const delay = 15000 + Math.random()*15000;
      setTimeout(() => {
        glitchBurst();
        loopSmall();
      }, delay);
    })();

    // full freeze / reconnect banners: every 30–45s
    (function loopBig(){
      const delay = 30000 + Math.random()*15000;
      setTimeout(() => {
        reconnectEvent();
        loopBig();
      }, delay);
    })();
  }

})();
</script>
</body>
</html>
